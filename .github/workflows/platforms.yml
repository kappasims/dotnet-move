name: Platforms (manual)

# Linux and macOS are not in per-push CI (that runs Windows + Windows PowerShell 5.1). Run this
# on demand before a release - via tools/Invoke-PlatformCI.ps1 or the Actions tab ("Run workflow") -
# to confirm the cross-platform engines pass on Ubuntu and macOS too.
on:
  workflow_dispatch:

# Read-only: this workflow only checks out and runs tests, never writes back to the repository.
permissions:
  contents: read
  packages: read

jobs:
  test:
    # Sharded per OS (separate processes), matching ci.yml: the suite shares process-global state so
    # it parallelizes across jobs, not in-process.
    name: Test (${{ matrix.os }}) [${{ matrix.shard }}/3]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        shard: [1, 2, 3]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Cache the CurrentUser module dir so Pester is not re-pulled from PSGallery every run.
      # pwsh on Linux/macOS installs CurrentUser modules under ~/.local/share/powershell/Modules.
      - name: Cache Pester
        id: cache-pester
        uses: actions/cache@v4
        with:
          path: ~/.local/share/powershell/Modules/Pester/5.7.1
          key: pester-5.7.1-${{ matrix.os }}

      # Ubuntu/macOS runners ship pwsh; build.ps1 no longer auto-installs Pester (cache miss only).
      - name: Install Pester
        if: steps.cache-pester.outputs.cache-hit != 'true'
        shell: pwsh
        run: Install-Module Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run tests
        shell: pwsh
        run: ./build.ps1 -Task Test -ShardIndex ${{ matrix.shard }} -ShardCount 3
