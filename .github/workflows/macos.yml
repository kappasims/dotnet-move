name: macOS (manual)

# Not part of normal CI: macOS is the third desktop target but rarely regresses on its
# own, and GitHub's macOS minutes bill at a higher multiplier. Run it on demand instead,
# via tools/Invoke-MacOSCI.ps1 or the Actions tab ("Run workflow").
on:
  workflow_dispatch:

jobs:
  test-macos:
    # macos-latest is the smallest GitHub-hosted macOS runner (Apple Silicon, 3 vCPU);
    # there is no smaller tier. Larger runners (macos-*-xlarge) cost more, so we stay here.
    name: Test (macos-latest)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # macOS runners ship PowerShell 7 (pwsh); build.ps1 no longer auto-installs Pester.
      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -MinimumVersion 5.0 -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run tests
        shell: pwsh
        run: ./build.ps1 -Task Test
